<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pogledaj se</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial,sans-serif}
.screen{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px}
h1{font-size:clamp(48px,12vw,120px);letter-spacing:.08em;margin:0 0 20px}
button{padding:16px 36px;border:1px solid #fff;background:transparent;color:#fff;font-size:20px;cursor:pointer}
#cam{display:none;height:100vh;position:relative}
video{width:100%;height:100%;object-fit:cover}
.msg{position:absolute;bottom:20px;left:0;right:0;text-align:center;background:rgba(0,0,0,.4);padding:15px}
</style>
</head>
<body>

<div id="start" class="screen">
<h1>POGLEDAJ SE</h1>
<p>Glavni učesnik te čeka.</p>
<button onclick="startCamera()">POGLEDAJ SE</button>
</div>

<div id="cam">
<video id="video" autoplay playsinline muted></video>
<div class="msg">
<strong>TO SI TI.</strong><br>
Ovaj trenutak postoji samo sada.
</div>
</div>

<script>
async function startCamera(){
try{
const constraints = {
 video: {
   facingMode: "user",
   width: { ideal: 1280 },
   height: { ideal: 720 }
 }
};

const stream = await navigator.mediaDevices.getUserMedia(constraints);

document.getElementById('start').style.display='none';
document.getElementById('cam').style.display='block';
document.getElementById('video').srcObject = stream;

} catch(e) {
alert("Kamera nije dostupna. Ovu stranicu otvori preko HTTPS linka i dozvoli pristup kameri.");
console.error(e);
}
}
</script>
</body>
</html>
